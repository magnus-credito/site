<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Em Breve | Magnus Estratégias</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    
    <style>
        .hero-coming-soon .hero-container {
            grid-template-columns: 1fr; /* Remove a divisão de duas colunas */
            text-align: center;
            justify-content: center;
        }
        .hero-coming-soon .hero-content {
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .hero-coming-soon .hero-btns {
            justify-content: center;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="logo">MAGNUS</div>
    </nav>

    <header class="hero hero-coming-soon">
        <div class="hero-overlay"></div>
        <div class="hero-container">
            <div class="hero-content reveal active">
                <span class="tagline">Inteligência Financeira</span>
                <h1>Em breve <br><span>Novidades</span></h1>
                <p>Estamos preparando uma nova experiência exclusiva para a alavancagem do seu legado patrimonial.</p>
                <div class="hero-btns">
                    <a href="https://lp.magnuscredito.com.br" class="btn-glamour">
                        Acessar Landing Page
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"></line>
                            <polyline points="12 5 19 12 12 19"></polyline>
                        </svg>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <script src="script.js"></script>
</body>
</html>
